<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SLRG Kurssuche</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230b3a8c'%3E%3Cpath d='M2 17c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2v3c-2 0-2 2-4 2s-2-2-4-2-2 2-4 2-2-2-4-2-2 2-4 2zM2 11c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2v3c-2 0-2 2-4 2s-2-2-4-2-2 2-4 2-2-2-4-2-2 2-4 2z'/%3E%3C/svg%3E" />
    <script>
      // Apply theme before paint to avoid flash. Stored value: "system" | "light" | "dark".
      (function () {
        try {
          var pref = localStorage.getItem("slrg.theme") || "system";
          var dark = pref === "dark" || (pref === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              border: "hsl(var(--border) / <alpha-value>)",
              input: "hsl(var(--input) / <alpha-value>)",
              ring: "hsl(var(--ring) / <alpha-value>)",
              background: "hsl(var(--background) / <alpha-value>)",
              foreground: "hsl(var(--foreground) / <alpha-value>)",
              muted: { DEFAULT: "hsl(var(--muted) / <alpha-value>)", foreground: "hsl(var(--muted-foreground) / <alpha-value>)" },
              card: { DEFAULT: "hsl(var(--card) / <alpha-value>)", foreground: "hsl(var(--card-foreground) / <alpha-value>)" },
              primary: { DEFAULT: "hsl(var(--primary) / <alpha-value>)", foreground: "hsl(var(--primary-foreground) / <alpha-value>)" },
              accent: { DEFAULT: "hsl(var(--accent) / <alpha-value>)", foreground: "hsl(var(--accent-foreground) / <alpha-value>)" },
            },
            fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
            keyframes: {
              "fade-in": { from: { opacity: 0, transform: "translateY(4px)" }, to: { opacity: 1, transform: "translateY(0)" } },
            },
            animation: { "fade-in": "fade-in .25s ease-out" },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Light theme — oriented toward slrg.ch (navy blue on white, with red accent). */
      :root {
        --background: 0 0% 100%;
        --foreground: 222 47% 11%;
        --muted: 220 14% 96%;
        --muted-foreground: 220 9% 46%;
        --card: 0 0% 100%;
        --card-foreground: 222 47% 11%;
        --border: 220 13% 91%;
        --input: 220 13% 91%;
        --primary: 220 78% 30%;          /* SLRG navy */
        --primary-foreground: 0 0% 100%;
        --accent: 220 14% 96%;
        --accent-foreground: 222 47% 11%;
        --ring: 220 78% 40%;
        --grid-dot: 220 78% 30% / 0.07;
        --glass-from: 0 0% 100% / 0.85;
        --glass-to: 0 0% 100% / 0.6;
      }
      /* Dark theme — original look. */
      .dark {
        --background: 222 47% 6%;
        --foreground: 210 40% 98%;
        --muted: 217 33% 13%;
        --muted-foreground: 215 20% 65%;
        --card: 222 47% 9%;
        --card-foreground: 210 40% 98%;
        --border: 217 33% 17%;
        --input: 217 33% 17%;
        --primary: 187 96% 43%;
        --primary-foreground: 222 47% 6%;
        --accent: 217 33% 17%;
        --accent-foreground: 210 40% 98%;
        --ring: 187 96% 43%;
        --grid-dot: 187 96% 43% / 0.08;
        --glass-from: 222 47% 9% / 0.85;
        --glass-to: 222 47% 9% / 0.6;
      }

      html, body { background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: Inter, system-ui, sans-serif; }
      html { color-scheme: light; }
      html.dark { color-scheme: dark; }

      .glass { background: linear-gradient(180deg, hsl(var(--glass-from)), hsl(var(--glass-to))); backdrop-filter: blur(12px); }
      .grid-bg { background-image: radial-gradient(hsl(var(--grid-dot)) 1px, transparent 1px); background-size: 28px 28px; }
      .scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
      .scrollbar::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 6px; }
      .scrollbar::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground) / .4); }
      .btn { display:inline-flex; align-items:center; gap:.5rem; padding:.5rem .9rem; border-radius:.6rem; font-size:.875rem; font-weight:500; transition:all .15s; }
      .btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
      .btn-primary:hover { filter: brightness(1.1); }
      .btn-ghost { background: transparent; color: hsl(var(--foreground)); border: 1px solid hsl(var(--border)); }
      .btn-ghost:hover { background: hsl(var(--muted)); }
      .badge { display:inline-flex; align-items:center; gap:.25rem; padding:.15rem .55rem; border-radius:9999px; font-size:.7rem; font-weight:500; line-height:1; }
      .input { background: hsl(var(--muted)); border: 1px solid hsl(var(--border)); border-radius: .6rem; padding: .55rem .85rem; color: hsl(var(--foreground)); transition:border .15s, box-shadow .15s; outline:none; }
      .input:focus { border-color: hsl(var(--ring)); box-shadow: 0 0 0 3px hsl(var(--ring) / 0.15); }
      .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: .85rem; }
      .card:hover { border-color: hsl(var(--primary) / 0.4); }

      /* Status badges — slightly different tinting per theme. */
      .badge-rose { background: hsl(350 89% 60% / .12); color: hsl(350 80% 40%); box-shadow: inset 0 0 0 1px hsl(350 89% 60% / .3); }
      .badge-amber { background: hsl(38 92% 50% / .12); color: hsl(32 80% 35%); box-shadow: inset 0 0 0 1px hsl(38 92% 50% / .3); }
      .badge-emerald { background: hsl(152 65% 45% / .12); color: hsl(152 65% 28%); box-shadow: inset 0 0 0 1px hsl(152 65% 45% / .3); }
      .dark .badge-rose { color: hsl(350 95% 80%); }
      .dark .badge-amber { color: hsl(38 95% 75%); }
      .dark .badge-emerald { color: hsl(152 70% 70%); }
      .text-amber-300 { color: hsl(38 95% 60%); }
      .dark .text-amber-300 { color: hsl(38 95% 75%); }
    </style>
  </head>
  <body class="min-h-screen grid-bg">
    <div id="app"></div>

    <script type="module">
      import { createApp, ref, computed, watch, onMounted } from "https://esm.sh/vue@3.4.27/dist/vue.esm-browser.prod.js";

      const CANTON_NAMES = {
        ZH:"Zürich",BE:"Bern",LU:"Luzern",UR:"Uri",SZ:"Schwyz",OW:"Obwalden",NW:"Nidwalden",
        GL:"Glarus",ZG:"Zug",FR:"Freiburg",SO:"Solothurn",BS:"Basel-Stadt",BL:"Basel-Landschaft",
        SH:"Schaffhausen",AR:"Appenzell A.Rh.",AI:"Appenzell I.Rh.",SG:"St. Gallen",GR:"Graubünden",
        AG:"Aargau",TG:"Thurgau",TI:"Tessin",VD:"Waadt",VS:"Wallis",NE:"Neuenburg",GE:"Genf",
        JU:"Jura",FL:"Liechtenstein",
      };
      const CANTON_LABEL = c => CANTON_NAMES[c] ? `${c} – ${CANTON_NAMES[c]}` : c;
      const todayISO = () => new Date().toISOString().slice(0, 10);
      const FILTER_KEY = "slrg.filters.v2";

      const DEFAULTS = {
        q: "", cat: "", loc: "", radiusKm: 0,
        dateFrom: "", dateTo: "", company: "",
        availability: "upcoming", // 'all' | 'upcoming' | 'open'
        sortBy: "first_date", sortDir: "asc",
      };

      function readUrlState() {
        const u = new URLSearchParams(location.search);
        const o = {};
        for (const k of Object.keys(DEFAULTS)) {
          if (u.has(k)) {
            const v = u.get(k);
            o[k] = (k === "radiusKm") ? (parseInt(v, 10) || 0) : v;
          }
        }
        return o;
      }
      function readStorageState() {
        try {
          const s = JSON.parse(localStorage.getItem(FILTER_KEY) || "null");
          return (s && typeof s === "object") ? s : {};
        } catch { return {}; }
      }

      const App = {
        setup() {
          const courses = ref([]);
          const meta = ref({ scraped_at: "", count: 0 });
          const loading = ref(true);
          const error = ref("");

          // ── filter state (URL > localStorage > defaults) ──────────────
          const initial = { ...DEFAULTS, ...readStorageState(), ...readUrlState() };
          const q = ref(initial.q);
          const cat = ref(initial.cat);
          const loc = ref(initial.loc);
          const radiusKm = ref(Number(initial.radiusKm) || 0);
          const dateFrom = ref(initial.dateFrom);
          const dateTo = ref(initial.dateTo);
          const company = ref(initial.company);
          const availability = ref(initial.availability);
          const sortBy = ref(initial.sortBy);
          const sortDir = ref(initial.sortDir);
          const limit = ref(60);
          const drawerOpen = ref(false);
          const geoBusy = ref(false);
          const geoError = ref("");

          // ── theme ─────────────────────────────────────────────────────
          const theme = ref(localStorage.getItem("slrg.theme") || "system");
          function applyTheme(t) {
            const dark = t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
            document.documentElement.classList.toggle("dark", dark);
          }
          applyTheme(theme.value);
          watch(theme, t => { localStorage.setItem("slrg.theme", t); applyTheme(t); });
          try {
            matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
              if (theme.value === "system") applyTheme("system");
            });
          } catch {}

          onMounted(async () => {
            try {
              const r = await fetch("./courses.json", { cache: "no-store" });
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              const d = await r.json();
              courses.value = d.courses;
              meta.value = { scraped_at: d.scraped_at, count: d.count };
            } catch (e) {
              error.value = String(e.message || e);
            } finally {
              loading.value = false;
            }
          });

          // ── derived option lists ──────────────────────────────────────
          const categories = computed(() =>
            [...new Set(courses.value.map(c => c.category).filter(Boolean))].sort()
          );
          const companies = computed(() =>
            [...new Set(courses.value.map(c => c.company).filter(Boolean))].sort()
          );
          const cities = computed(() =>
            [...new Set(courses.value.map(c => c.city).filter(Boolean))].sort()
          );
          const cantons = computed(() =>
            [...new Set(courses.value.map(c => c.canton).filter(Boolean))].sort()
          );
          const cityCoords = computed(() => {
            const map = new Map();
            for (const c of courses.value) {
              if (c.city && c.lat != null && c.lng != null && !map.has(c.city)) {
                map.set(c.city, { lat: c.lat, lng: c.lng });
              }
            }
            return map;
          });

          // ── unified location resolution ───────────────────────────────
          // input -> {kind:'city'|'canton'|'coord'|null, city?, canton?, coord?, label}
          const locInput = computed(() => loc.value.trim());
          const locResolved = ref(null); // {kind:'coord', coord:{lat,lng}, label} for Near-Me

          const locationMatch = computed(() => {
            // Explicit Near-Me coordinate takes priority while loc input is the same label
            if (locResolved.value && loc.value === locResolved.value.label) {
              return locResolved.value;
            }
            const t = locInput.value;
            if (!t) return null;
            const tl = t.toLowerCase();

            // "Kanton XY" prefix
            const mKanton = t.match(/^kanton\s+(.+)$/i);
            if (mKanton) {
              const inner = mKanton[1].trim().toLowerCase();
              for (const code of cantons.value) {
                if (code.toLowerCase() === inner || (CANTON_NAMES[code] || "").toLowerCase() === inner) {
                  return { kind: "canton", canton: code, label: `Kanton ${CANTON_LABEL(code)}` };
                }
              }
            }
            // 2-letter canton code (when present in dataset)
            if (/^[A-Za-z]{2}$/.test(t)) {
              const code = t.toUpperCase();
              if (cantons.value.includes(code)) {
                return { kind: "canton", canton: code, label: `Kanton ${CANTON_LABEL(code)}` };
              }
            }
            // Exact city match (case-insensitive)
            const cityHit = cities.value.find(c => c.toLowerCase() === tl);
            if (cityHit) {
              return { kind: "city", city: cityHit, coord: cityCoords.value.get(cityHit) || null, label: cityHit };
            }
            // Canton full name (e.g. "Zürich" if no city of same name; otherwise city wins above)
            for (const code of cantons.value) {
              if ((CANTON_NAMES[code] || "").toLowerCase() === tl) {
                return { kind: "canton", canton: code, label: `Kanton ${CANTON_LABEL(code)}` };
              }
            }
            return null;
          });

          // Suggestions for the location combobox: cities + "Kanton …" entries
          const locSuggestions = computed(() => {
            const out = [];
            for (const c of cities.value) out.push(c);
            for (const code of cantons.value) {
              out.push(`Kanton ${CANTON_LABEL(code)}`);
            }
            return out;
          });

          // ── distance helpers ──────────────────────────────────────────
          function haversineKm(a, b) {
            if (!a || !b) return null;
            const R = 6371, toRad = d => d * Math.PI / 180;
            const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
            const s = Math.sin(dLat / 2) ** 2 +
              Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng / 2) ** 2;
            return 2 * R * Math.asin(Math.sqrt(s));
          }
          function fmtDist(km) {
            if (km == null) return "";
            if (km < 1) return `${Math.round(km * 1000)} m`;
            if (km < 10) return `${km.toFixed(1)} km`;
            return `${Math.round(km)} km`;
          }

          // ── filtering & sorting ───────────────────────────────────────
          const today = computed(() => todayISO());

          const filtered = computed(() => {
            const needle = q.value.trim().toLowerCase();
            const m = locationMatch.value;
            const origin = m && m.coord ? m.coord : null;
            const radius = radiusKm.value;
            const t = today.value;

            let arr = courses.value.map(c => {
              const dist = origin && c.lat != null && c.lng != null
                ? haversineKm(origin, { lat: c.lat, lng: c.lng })
                : null;
              return { c, dist };
            }).filter(({ c, dist }) => {
              if (cat.value && c.category !== cat.value) return false;
              if (company.value && c.company !== company.value) return false;
              if (m) {
                if (m.kind === "canton" && c.canton !== m.canton) return false;
                if (m.kind === "city" && c.city !== m.city) return false;
                // For 'coord' kind we filter by radius below.
              }
              if (origin && radius > 0 && (dist == null || dist > radius)) return false;
              if (dateFrom.value && c.last_date && c.last_date < dateFrom.value) return false;
              if (dateTo.value && c.first_date && c.first_date > dateTo.value) return false;
              if (availability.value === "upcoming" && c.last_date && c.last_date < t) return false;
              if (availability.value === "open") {
                if (c.last_date && c.last_date < t) return false;
                const free = (c.participation_max ?? 0) - (c.registered ?? 0);
                if (free <= 0) return false;
              }
              if (needle) {
                const hay = `${c.category} ${c.company} ${c.city} ${c.canton ?? ''} ${c.key}`.toLowerCase();
                if (!hay.includes(needle)) return false;
              }
              return true;
            });

            const dir = sortDir.value === "asc" ? 1 : -1;
            if (origin && sortBy.value === "distance") {
              arr.sort((a, b) => {
                if (a.dist == null) return 1;
                if (b.dist == null) return -1;
                return (a.dist - b.dist) * dir;
              });
            } else {
              arr.sort((a, b) => {
                const av = a.c[sortBy.value] ?? "";
                const bv = b.c[sortBy.value] ?? "";
                if (av < bv) return -1 * dir;
                if (av > bv) return 1 * dir;
                return 0;
              });
            }
            return arr;
          });

          const visible = computed(() => filtered.value.slice(0, limit.value));

          // ── persistence + URL sync ────────────────────────────────────
          const allFilters = computed(() => ({
            q: q.value, cat: cat.value, loc: loc.value, radiusKm: radiusKm.value,
            dateFrom: dateFrom.value, dateTo: dateTo.value, company: company.value,
            availability: availability.value, sortBy: sortBy.value, sortDir: sortDir.value,
          }));

          function syncUrl(state) {
            const u = new URLSearchParams();
            for (const [k, v] of Object.entries(state)) {
              if (v === DEFAULTS[k] || v === "" || v == null) continue;
              u.set(k, String(v));
            }
            const qs = u.toString();
            const url = qs ? `${location.pathname}?${qs}` : location.pathname;
            history.replaceState(null, "", url + location.hash);
          }

          watch(allFilters, (state) => {
            limit.value = 60;
            try { localStorage.setItem(FILTER_KEY, JSON.stringify(state)); } catch {}
            syncUrl(state);
          }, { deep: true });

          // First run: ensure URL reflects current state (in case localStorage filled defaults)
          syncUrl(allFilters.value);

          // Auto-pick distance sort when location resolves to coordinates
          watch(locationMatch, (m, prev) => {
            if (m && m.coord && (!prev || !prev.coord)) sortBy.value = "distance";
            else if ((!m || !m.coord) && sortBy.value === "distance") sortBy.value = "first_date";
          });

          // Active filter count (for the Filter button badge)
          const activeFilterCount = computed(() => {
            let n = 0;
            const a = allFilters.value;
            if (a.q) n++;
            if (a.cat) n++;
            if (a.loc) n++;
            if (a.radiusKm) n++;
            if (a.dateFrom) n++;
            if (a.dateTo) n++;
            if (a.company) n++;
            if (a.availability !== DEFAULTS.availability) n++;
            return n;
          });

          // ── actions ───────────────────────────────────────────────────
          function reset() {
            q.value = ""; cat.value = ""; loc.value = ""; radiusKm.value = 0;
            dateFrom.value = ""; dateTo.value = ""; company.value = "";
            availability.value = "upcoming";
            sortBy.value = "first_date"; sortDir.value = "asc";
            locResolved.value = null;
            try { localStorage.removeItem(FILTER_KEY); } catch {}
          }

          // "In meiner Nähe": geolocate, then snap to nearest known city
          function locateMe() {
            if (!navigator.geolocation) {
              geoError.value = "Geolokalisierung wird nicht unterstützt.";
              return;
            }
            geoBusy.value = true;
            geoError.value = "";
            navigator.geolocation.getCurrentPosition(
              (pos) => {
                geoBusy.value = false;
                const here = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                let best = null, bestD = Infinity;
                for (const [name, co] of cityCoords.value) {
                  const d = haversineKm(here, co);
                  if (d != null && d < bestD) { bestD = d; best = { name, co }; }
                }
                if (!best) {
                  geoError.value = "Keine Orte in der Nähe gefunden.";
                  return;
                }
                locResolved.value = { kind: "coord", coord: here, label: `📍 ${best.name}` };
                loc.value = locResolved.value.label;
                if (!radiusKm.value) radiusKm.value = 30;
              },
              (err) => {
                geoBusy.value = false;
                geoError.value = err.code === 1
                  ? "Standortzugriff verweigert."
                  : "Standort konnte nicht ermittelt werden.";
              },
              { enableHighAccuracy: false, timeout: 8000, maximumAge: 5 * 60 * 1000 }
            );
          }

          // Clear locResolved if user edits the input away from its label
          watch(loc, (v) => {
            if (locResolved.value && v !== locResolved.value.label) locResolved.value = null;
          });

          // ── formatters ────────────────────────────────────────────────
          function fmtDate(s) {
            if (!s) return "—";
            const [y, m, d] = s.split("-");
            return `${d}.${m}.${y}`;
          }
          function fmtRange(a, b) {
            if (!a) return "—";
            if (!b || a === b) return fmtDate(a);
            return `${fmtDate(a)} – ${fmtDate(b)}`;
          }
          function freeSpots(c) {
            const max = c.participation_max ?? 0;
            const reg = c.registered ?? 0;
            return Math.max(0, max - reg);
          }
          function statusBadge(c) {
            const free = freeSpots(c);
            const max = c.participation_max ?? 0;
            if (max === 0) return { label: "—", cls: "bg-muted text-muted-foreground" };
            if (free === 0) return { label: "Voll", cls: "badge-rose" };
            if (free <= Math.max(2, Math.floor(max * 0.2))) return { label: `${free} frei`, cls: "badge-amber" };
            return { label: `${free} frei`, cls: "badge-emerald" };
          }
          function relTime(iso) {
            if (!iso) return "";
            try {
              const t = new Date(iso);
              const diff = (Date.now() - t.getTime()) / 1000;
              if (diff < 60) return "gerade eben";
              if (diff < 3600) return `vor ${Math.floor(diff / 60)} Min`;
              if (diff < 86400) return `vor ${Math.floor(diff / 3600)} Std`;
              return `vor ${Math.floor(diff / 86400)} T`;
            } catch { return iso; }
          }

          return {
            courses, meta, loading, error,
            q, cat, loc, radiusKm, dateFrom, dateTo, company, availability,
            sortBy, sortDir, limit, drawerOpen, geoBusy, geoError,
            categories, companies, locSuggestions,
            locationMatch, filtered, visible, activeFilterCount,
            theme, reset, locateMe,
            fmtRange, statusBadge, relTime, fmtDist, CANTON_LABEL,
          };
        },
        template: `
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
          <!-- Header -->
          <header class="flex items-center justify-between gap-4 mb-6 sm:mb-8">
            <div class="flex items-center gap-3 min-w-0">
              <div class="h-10 w-10 rounded-xl bg-primary/15 ring-1 ring-primary/30 flex items-center justify-center shrink-0">
                <svg class="w-6 h-6 text-primary" viewBox="0 0 24 24" fill="currentColor"><path d="M2 17c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2v3c-2 0-2 2-4 2s-2-2-4-2-2 2-4 2-2-2-4-2-2 2-4 2zM2 11c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2v3c-2 0-2 2-4 2s-2-2-4-2-2 2-4 2-2-2-4-2-2 2-4 2z"/></svg>
              </div>
              <div class="min-w-0">
                <h1 class="text-xl sm:text-2xl font-semibold tracking-tight">SLRG Kurssuche</h1>
                <p class="hidden sm:block text-sm text-muted-foreground truncate">
                  Alle Kurse der Schweizerischen Lebensrettungs-Gesellschaft – durchsuchbar.
                </p>
              </div>
            </div>
            <div class="flex items-center gap-3 shrink-0">
              <span class="hidden md:inline-flex items-center gap-1.5 text-xs text-muted-foreground">
                <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
                {{ meta.count }} · {{ relTime(meta.scraped_at) }}
              </span>
              <div class="inline-flex items-center rounded-lg border border-border bg-muted/50 p-0.5" role="group" aria-label="Farbschema">
                <button @click="theme = 'system'" title="System"
                  :class="['h-7 w-7 rounded-md flex items-center justify-center transition', theme === 'system' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground']">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 21h8M12 18v3"/></svg>
                </button>
                <button @click="theme = 'light'" title="Hell"
                  :class="['h-7 w-7 rounded-md flex items-center justify-center transition', theme === 'light' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground']">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                </button>
                <button @click="theme = 'dark'" title="Dunkel"
                  :class="['h-7 w-7 rounded-md flex items-center justify-center transition', theme === 'dark' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground']">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
              </div>
            </div>
          </header>

          <div v-if="loading" class="card p-12 text-center text-muted-foreground">
            <div class="inline-block h-6 w-6 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
            <div class="mt-3">Lade Kurse…</div>
          </div>
          <div v-else-if="error" class="card p-8 ring-1 ring-rose-500/30">
            <strong class="text-rose-500">Fehler:</strong> {{ error }}
          </div>

          <template v-else>
          <!-- Compact filter bar -->
          <section class="glass card p-3 sm:p-4 mb-6 sticky top-3 z-20">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-2 sm:gap-3">
              <!-- Keywords -->
              <div class="md:col-span-5 relative">
                <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input v-model="q" type="search" placeholder="Suchen…"
                  class="input w-full pl-9" aria-label="Stichwortsuche" />
              </div>
              <!-- Location combobox -->
              <div class="md:col-span-5 relative">
                <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <input v-model="loc" list="loc-list" type="search"
                  placeholder="Ort, Kanton (z.B. Zürich, ZH, Kreuzlingen)"
                  class="input w-full pl-9 pr-10" aria-label="Standort" />
                <datalist id="loc-list">
                  <option v-for="s in locSuggestions" :key="s" :value="s"></option>
                </datalist>
                <button type="button" @click="locateMe" :disabled="geoBusy"
                  :title="geoBusy ? 'Suche…' : 'In meiner Nähe'"
                  class="absolute right-1.5 top-1/2 -translate-y-1/2 h-7 w-7 rounded-md flex items-center justify-center text-muted-foreground hover:text-primary hover:bg-muted transition disabled:opacity-50">
                  <svg v-if="!geoBusy" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
                  <svg v-else class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg>
                </button>
              </div>
              <!-- Filter drawer toggle -->
              <button type="button" @click="drawerOpen = !drawerOpen"
                :class="['md:col-span-2 btn relative', drawerOpen || activeFilterCount ? 'btn-primary' : 'btn-ghost', 'justify-center']"
                :aria-expanded="drawerOpen">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
                Filter
                <span v-if="activeFilterCount" class="ml-1 inline-flex items-center justify-center min-w-[1.25rem] h-5 px-1 rounded-full text-[10px] font-bold"
                  :class="drawerOpen || activeFilterCount ? 'bg-primary-foreground text-primary' : 'bg-primary text-primary-foreground'">
                  {{ activeFilterCount }}
                </span>
              </button>
            </div>

            <!-- Radius slider, only when location resolves to coordinates -->
            <div v-if="locationMatch && locationMatch.coord" class="mt-3 flex items-center gap-3">
              <span class="text-xs text-muted-foreground whitespace-nowrap">Umkreis um {{ locationMatch.label }}:</span>
              <input type="range" min="0" max="200" step="5" v-model.number="radiusKm" class="flex-1 accent-primary" aria-label="Umkreis" />
              <span class="text-xs font-mono w-20 text-right">{{ radiusKm > 0 ? radiusKm + ' km' : 'unbegrenzt' }}</span>
            </div>
            <div v-if="loc && !locationMatch" class="mt-2 text-xs text-amber-300">
              „{{ loc }}" nicht gefunden — Vorschlag aus der Liste wählen.
            </div>
            <div v-if="geoError" class="mt-2 text-xs text-rose-400">{{ geoError }}</div>

            <!-- Drawer -->
            <transition
              enter-active-class="transition-all duration-200 ease-out overflow-hidden"
              leave-active-class="transition-all duration-150 ease-in overflow-hidden"
              enter-from-class="opacity-0 max-h-0"
              enter-to-class="opacity-100 max-h-[600px]"
              leave-from-class="opacity-100 max-h-[600px]"
              leave-to-class="opacity-0 max-h-0">
            <div v-show="drawerOpen" class="mt-4 pt-4 border-t border-border">
              <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
                <div class="md:col-span-4">
                  <label class="text-xs text-muted-foreground mb-1 block">Kategorie</label>
                  <select v-model="cat" class="input w-full">
                    <option value="">Alle Kategorien</option>
                    <option v-for="c in categories" :key="c" :value="c">{{ c }}</option>
                  </select>
                </div>
                <div class="md:col-span-4">
                  <label class="text-xs text-muted-foreground mb-1 block">Anbieter</label>
                  <select v-model="company" class="input w-full">
                    <option value="">Alle Anbieter</option>
                    <option v-for="c in companies" :key="c" :value="c">{{ c }}</option>
                  </select>
                </div>
                <div class="md:col-span-2">
                  <label class="text-xs text-muted-foreground mb-1 block">Von</label>
                  <input type="date" v-model="dateFrom" class="input w-full" />
                </div>
                <div class="md:col-span-2">
                  <label class="text-xs text-muted-foreground mb-1 block">Bis</label>
                  <input type="date" v-model="dateTo" class="input w-full" />
                </div>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-12 gap-3 mt-3">
                <div class="md:col-span-6">
                  <label class="text-xs text-muted-foreground mb-1 block">Verfügbarkeit</label>
                  <div class="inline-flex rounded-lg border border-border bg-muted/50 p-0.5 w-full">
                    <button type="button" @click="availability = 'all'"
                      :class="['flex-1 px-3 py-1.5 rounded-md text-xs font-medium transition', availability === 'all' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground']">Alle</button>
                    <button type="button" @click="availability = 'upcoming'"
                      :class="['flex-1 px-3 py-1.5 rounded-md text-xs font-medium transition', availability === 'upcoming' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground']">Nur kommende</button>
                    <button type="button" @click="availability = 'open'"
                      :class="['flex-1 px-3 py-1.5 rounded-md text-xs font-medium transition', availability === 'open' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground']">Mit freien Plätzen</button>
                  </div>
                </div>
                <div class="md:col-span-6">
                  <label class="text-xs text-muted-foreground mb-1 block">Sortierung</label>
                  <div class="flex gap-2">
                    <select v-model="sortBy" class="input flex-1">
                      <option value="first_date">Startdatum</option>
                      <option value="last_date">Enddatum</option>
                      <option value="category">Kategorie</option>
                      <option value="city">Ort</option>
                      <option value="canton">Kanton</option>
                      <option value="company">Anbieter</option>
                      <option value="distance" :disabled="!locationMatch || !locationMatch.coord">Distanz</option>
                    </select>
                    <button type="button" class="btn btn-ghost px-3" @click="sortDir = sortDir === 'asc' ? 'desc' : 'asc'" :aria-label="'Richtung'">
                      {{ sortDir === 'asc' ? '↑' : '↓' }}
                    </button>
                    <button type="button" class="btn btn-ghost text-xs" @click="reset">Zurücksetzen</button>
                  </div>
                </div>
              </div>
            </div>
            </transition>

            <div class="text-xs text-muted-foreground mt-3 flex items-center justify-between">
              <span>
                <span class="font-medium text-foreground">{{ filtered.length }}</span> Treffer
                <span v-if="filtered.length > visible.length"> · zeige {{ visible.length }}</span>
              </span>
              <span class="md:hidden inline-flex items-center gap-1.5">
                <span class="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                {{ relTime(meta.scraped_at) }}
              </span>
            </div>
          </section>

          <!-- Grid -->
          <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <a v-for="item in visible" :key="item.c.key" :href="item.c.url" target="_blank" rel="noopener"
              class="card p-5 animate-fade-in transition group">
              <div class="flex items-start justify-between gap-3">
                <div class="text-xs text-primary font-medium tracking-wide uppercase truncate">{{ item.c.category || '—' }}</div>
                <span class="badge shrink-0" :class="statusBadge(item.c).cls">{{ statusBadge(item.c).label }}</span>
              </div>
              <h3 class="mt-2 text-lg font-semibold leading-snug group-hover:text-primary transition">
                {{ item.c.city || item.c.company || 'Kurs ' + item.c.key }}
              </h3>
              <div class="mt-1 flex items-center gap-2 text-sm text-muted-foreground">
                <span class="truncate">{{ item.c.company }}</span>
                <span v-if="item.c.canton" class="badge bg-muted text-muted-foreground ring-1 ring-border shrink-0">{{ item.c.canton }}</span>
              </div>

              <div class="mt-4 flex items-center gap-2 text-sm">
                <svg class="w-4 h-4 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                <span>{{ fmtRange(item.c.first_date, item.c.last_date) }}</span>
              </div>

              <div class="mt-3 flex items-center justify-between text-xs text-muted-foreground">
                <span class="inline-flex items-center gap-1">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                  {{ item.c.registered ?? 0 }} / {{ item.c.participation_max ?? '?' }}
                </span>
                <span class="flex items-center gap-2">
                  <span v-if="item.dist != null" class="text-primary font-medium">{{ fmtDist(item.dist) }}</span>
                  <span class="font-mono opacity-60">#{{ item.c.key }}</span>
                </span>
              </div>
            </a>
          </section>

          <div v-if="filtered.length > visible.length" class="flex justify-center mt-8">
            <button class="btn btn-primary" @click="limit += 60">Weitere {{ Math.min(60, filtered.length - visible.length) }} laden</button>
          </div>

          <div v-if="filtered.length === 0" class="card p-12 text-center text-muted-foreground">
            Keine Kurse gefunden. Filter anpassen oder zurücksetzen.
          </div>

          <footer class="mt-12 text-center text-xs text-muted-foreground">
            Daten von <a href="https://ausbildung.slrg.ch/Kurskalender" class="text-primary hover:underline">ausbildung.slrg.ch</a>.
            Diese App ist nicht offiziell.
          </footer>
          </template>
        </div>
        `,
      };

      createApp(App).mount("#app");
    </script>
  </body>
</html>
