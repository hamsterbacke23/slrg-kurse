<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SLRG Kurssuche</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230b3a8c'%3E%3Cpath d='M2 17c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2v3c-2 0-2 2-4 2s-2-2-4-2-2 2-4 2-2-2-4-2-2 2-4 2zM2 11c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2v3c-2 0-2 2-4 2s-2-2-4-2-2 2-4 2-2-2-4-2-2 2-4 2z'/%3E%3C/svg%3E" />
    <script>
      // Apply theme before paint to avoid flash. Stored value: "system" | "light" | "dark".
      (function () {
        try {
          var pref = localStorage.getItem("slrg.theme") || "system";
          var dark = pref === "dark" || (pref === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              border: "hsl(var(--border) / <alpha-value>)",
              input: "hsl(var(--input) / <alpha-value>)",
              ring: "hsl(var(--ring) / <alpha-value>)",
              background: "hsl(var(--background) / <alpha-value>)",
              foreground: "hsl(var(--foreground) / <alpha-value>)",
              muted: { DEFAULT: "hsl(var(--muted) / <alpha-value>)", foreground: "hsl(var(--muted-foreground) / <alpha-value>)" },
              card: { DEFAULT: "hsl(var(--card) / <alpha-value>)", foreground: "hsl(var(--card-foreground) / <alpha-value>)" },
              primary: { DEFAULT: "hsl(var(--primary) / <alpha-value>)", foreground: "hsl(var(--primary-foreground) / <alpha-value>)" },
              accent: { DEFAULT: "hsl(var(--accent) / <alpha-value>)", foreground: "hsl(var(--accent-foreground) / <alpha-value>)" },
            },
            fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
            keyframes: {
              "fade-in": { from: { opacity: 0, transform: "translateY(4px)" }, to: { opacity: 1, transform: "translateY(0)" } },
            },
            animation: { "fade-in": "fade-in .25s ease-out" },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Light theme — oriented toward slrg.ch (navy blue on white, with red accent). */
      :root {
        --background: 0 0% 100%;
        --foreground: 222 47% 11%;
        --muted: 220 14% 96%;
        --muted-foreground: 220 9% 46%;
        --card: 0 0% 100%;
        --card-foreground: 222 47% 11%;
        --border: 220 13% 91%;
        --input: 220 13% 91%;
        --primary: 220 78% 30%;          /* SLRG navy */
        --primary-foreground: 0 0% 100%;
        --accent: 220 14% 96%;
        --accent-foreground: 222 47% 11%;
        --ring: 220 78% 40%;
        --grid-dot: 220 78% 30% / 0.07;
        --glass-from: 0 0% 100% / 0.85;
        --glass-to: 0 0% 100% / 0.6;
      }
      /* Dark theme — original look. */
      .dark {
        --background: 222 47% 6%;
        --foreground: 210 40% 98%;
        --muted: 217 33% 13%;
        --muted-foreground: 215 20% 65%;
        --card: 222 47% 9%;
        --card-foreground: 210 40% 98%;
        --border: 217 33% 17%;
        --input: 217 33% 17%;
        --primary: 187 96% 43%;
        --primary-foreground: 222 47% 6%;
        --accent: 217 33% 17%;
        --accent-foreground: 210 40% 98%;
        --ring: 187 96% 43%;
        --grid-dot: 187 96% 43% / 0.08;
        --glass-from: 222 47% 9% / 0.85;
        --glass-to: 222 47% 9% / 0.6;
      }

      html, body { background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: Inter, system-ui, sans-serif; }
      html { color-scheme: light; }
      html.dark { color-scheme: dark; }

      .glass { background: linear-gradient(180deg, hsl(var(--glass-from)), hsl(var(--glass-to))); backdrop-filter: blur(12px); }
      .grid-bg { background-image: radial-gradient(hsl(var(--grid-dot)) 1px, transparent 1px); background-size: 28px 28px; }
      .scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
      .scrollbar::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 6px; }
      .scrollbar::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground) / .4); }
      .btn { display:inline-flex; align-items:center; gap:.5rem; padding:.5rem .9rem; border-radius:.6rem; font-size:.875rem; font-weight:500; transition:all .15s; }
      .btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
      .btn-primary:hover { filter: brightness(1.1); }
      .btn-ghost { background: transparent; color: hsl(var(--foreground)); border: 1px solid hsl(var(--border)); }
      .btn-ghost:hover { background: hsl(var(--muted)); }
      .badge { display:inline-flex; align-items:center; gap:.25rem; padding:.15rem .55rem; border-radius:9999px; font-size:.7rem; font-weight:500; line-height:1; }
      .input { background: hsl(var(--muted)); border: 1px solid hsl(var(--border)); border-radius: .6rem; padding: .55rem .85rem; color: hsl(var(--foreground)); transition:border .15s, box-shadow .15s; outline:none; }
      .input:focus { border-color: hsl(var(--ring)); box-shadow: 0 0 0 3px hsl(var(--ring) / 0.15); }
      /* Native-looking select with consistent chevron across browsers */
      select.input {
        -webkit-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
        background-repeat: no-repeat;
        background-position: right 0.7rem center;
        background-size: 1rem 1rem;
        padding-right: 2.25rem;
        cursor: pointer;
      }
      .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: .85rem; }
      .card:hover { border-color: hsl(var(--primary) / 0.4); }

      /* Status badges — slightly different tinting per theme. */
      .badge-rose { background: hsl(350 89% 60% / .12); color: hsl(350 80% 40%); box-shadow: inset 0 0 0 1px hsl(350 89% 60% / .3); }
      .badge-amber { background: hsl(38 92% 50% / .12); color: hsl(32 80% 35%); box-shadow: inset 0 0 0 1px hsl(38 92% 50% / .3); }
      .badge-emerald { background: hsl(152 65% 45% / .12); color: hsl(152 65% 28%); box-shadow: inset 0 0 0 1px hsl(152 65% 45% / .3); }
      .dark .badge-rose { color: hsl(350 95% 80%); }
      .dark .badge-amber { color: hsl(38 95% 75%); }
      .dark .badge-emerald { color: hsl(152 70% 70%); }
      .text-amber-300 { color: hsl(38 95% 60%); }
      .dark .text-amber-300 { color: hsl(38 95% 75%); }
    </style>
  </head>
  <body class="min-h-screen grid-bg">
    <div id="app"></div>

    <script type="module">
      import { createApp, ref, computed, watch, onMounted } from "https://esm.sh/vue@3.4.27/dist/vue.esm-browser.prod.js";
      const App = {
        directives: {
          "click-outside": {
            mounted(el, binding) {
              el.__cohandler = (e) => { if (!el.contains(e.target)) binding.value(e); };
              document.addEventListener("mousedown", el.__cohandler);
            },
            unmounted(el) { document.removeEventListener("mousedown", el.__cohandler); },
          },
        },
        setup() {
          const courses = ref([]);
          const meta = ref({ scraped_at: "", count: 0 });
          const loading = ref(true);
          const error = ref("");

          const q = ref("");
          const cat = ref("");
          const company = ref("");
          const city = ref("");
          const canton = ref("");
          const near = ref("");      // city name to sort "closest to"
          const radiusKm = ref(0);    // 0 = no limit
          const onlyOpen = ref(false);
          const onlyUpcoming = ref(true);
          const onlyWeekend = ref(false);
          const sortBy = ref("first_date");
          const sortDir = ref("asc");
          const limit = ref(60);
          const advancedOpen = ref(false);
          const geoBusy = ref(false);
          const geoError = ref("");

          // ── persistence ────────────────────────────────────────────────
          const FILTER_KEY = "slrg.filters.v1";
          try {
            const saved = JSON.parse(localStorage.getItem(FILTER_KEY) || "null");
            if (saved && typeof saved === "object") {
              if (typeof saved.q === "string") q.value = saved.q;
              if (typeof saved.cat === "string") cat.value = saved.cat;
              if (typeof saved.company === "string") company.value = saved.company;
              if (typeof saved.city === "string") city.value = saved.city;
              if (typeof saved.canton === "string") canton.value = saved.canton;
              if (typeof saved.near === "string") near.value = saved.near;
              if (typeof saved.radiusKm === "number") radiusKm.value = saved.radiusKm;
              if (typeof saved.onlyOpen === "boolean") onlyOpen.value = saved.onlyOpen;
              if (typeof saved.onlyUpcoming === "boolean") onlyUpcoming.value = saved.onlyUpcoming;
              if (typeof saved.onlyWeekend === "boolean") onlyWeekend.value = saved.onlyWeekend;
              if (typeof saved.sortBy === "string") sortBy.value = saved.sortBy;
              if (typeof saved.sortDir === "string") sortDir.value = saved.sortDir;
            }
          } catch {}

          // open advanced section if any of its filters were restored
          if (company.value || city.value || canton.value) advancedOpen.value = true;

          // ── theme: "system" | "light" | "dark" ─────────────────────────
          const theme = ref(localStorage.getItem("slrg.theme") || "system");
          function applyTheme(t) {
            const dark = t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
            document.documentElement.classList.toggle("dark", dark);
          }
          applyTheme(theme.value);
          watch(theme, (t) => {
            localStorage.setItem("slrg.theme", t);
            applyTheme(t);
          });
          // react to OS theme changes when in "system" mode
          try {
            matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
              if (theme.value === "system") applyTheme("system");
            });
          } catch {}

          onMounted(async () => {
            try {
              const r = await fetch("./courses.json", { cache: "no-store" });
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              const d = await r.json();
              courses.value = d.courses;
              meta.value = { scraped_at: d.scraped_at, count: d.count };
            } catch (e) {
              error.value = String(e.message || e);
            } finally {
              loading.value = false;
            }
          });

          // Categories restricted to those with results under the *other* active filters.
          // The currently-selected category is always included so it doesn't vanish.
          const categories = computed(() => {
            const origin = nearCoord.value;
            const radius = radiusKm.value;
            const set = new Set();
            for (const c of courses.value) {
              if (!c.category) continue;
              if (company.value && c.company !== company.value) continue;
              if (city.value && c.city !== city.value) continue;
              if (canton.value && c.canton !== canton.value) continue;
              if (onlyOpen.value) {
                const free = (c.participation_max ?? 0) - (c.registered ?? 0);
                if (free <= 0) continue;
              }
              if (onlyUpcoming.value && c.last_date && c.last_date < todayISO) continue;
              if (onlyWeekend.value && !isWeekendOnly(c.first_date, c.last_date)) continue;
              if (origin && radius > 0) {
                if (c.lat == null || c.lng == null) continue;
                const dist = haversineKm(origin, { lat: c.lat, lng: c.lng });
                if (dist == null || dist > radius) continue;
              }
              set.add(c.category);
            }
            if (cat.value) set.add(cat.value);
            return [...set].sort();
          });
          const companies = computed(() =>
            [...new Set(courses.value.map(c => c.company).filter(Boolean))].sort()
          );
          const cities = computed(() =>
            [...new Set(courses.value.map(c => c.city).filter(Boolean))].sort()
          );
          const cantons = computed(() =>
            [...new Set(courses.value.map(c => c.canton).filter(Boolean))].sort()
          );

          const CANTON_NAMES = {
            ZH:"Zürich",BE:"Bern",LU:"Luzern",UR:"Uri",SZ:"Schwyz",OW:"Obwalden",NW:"Nidwalden",
            GL:"Glarus",ZG:"Zug",FR:"Freiburg",SO:"Solothurn",BS:"Basel-Stadt",BL:"Basel-Landschaft",
            SH:"Schaffhausen",AR:"Appenzell A.Rh.",AI:"Appenzell I.Rh.",SG:"St. Gallen",GR:"Graubünden",
            AG:"Aargau",TG:"Thurgau",TI:"Tessin",VD:"Waadt",VS:"Wallis",NE:"Neuenburg",GE:"Genf",
            JU:"Jura",FL:"Liechtenstein"
          };
          function cantonLabel(code){ return CANTON_NAMES[code] ? `${code} – ${CANTON_NAMES[code]}` : code; }

          // city → {lat,lng} from any course that has it
          const cityCoords = computed(() => {
            const map = new Map();
            for (const c of courses.value) {
              if (c.city && c.lat != null && c.lng != null && !map.has(c.city)) {
                map.set(c.city, { lat: c.lat, lng: c.lng });
              }
            }
            return map;
          });

          const nearCoord = computed(() => near.value ? cityCoords.value.get(near.value) : null);

          function haversineKm(a, b) {
            if (!a || !b) return null;
            const R = 6371, toRad = d => d * Math.PI / 180;
            const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
            const s = Math.sin(dLat/2)**2 +
              Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng/2)**2;
            return 2 * R * Math.asin(Math.sqrt(s));
          }

          const todayISO = new Date().toISOString().slice(0, 10);

          // True iff every day from first_date through last_date falls on Sat/Sun.
          // Used for the "Nur Wochenende" filter. Returns false for missing dates
          // or ranges longer than ~3 days (multi-week courses can't be weekend-only).
          function isWeekendOnly(first, last) {
            if (!first) return false;
            const start = new Date(first + "T00:00:00");
            const end = new Date((last || first) + "T00:00:00");
            if (isNaN(start) || isNaN(end) || end < start) return false;
            const days = Math.round((end - start) / 86400000) + 1;
            if (days > 3) return false;
            for (let i = 0; i < days; i++) {
              const d = new Date(start);
              d.setDate(start.getDate() + i);
              const wd = d.getDay(); // 0=Sun, 6=Sat
              if (wd !== 0 && wd !== 6) return false;
            }
            return true;
          }

          const filtered = computed(() => {
            const origin = nearCoord.value;
            const radius = radiusKm.value;

            let arr = courses.value.map(c => {
              const dist = origin && c.lat != null && c.lng != null
                ? haversineKm(origin, { lat: c.lat, lng: c.lng })
                : null;
              return { c, dist };
            }).filter(({ c, dist }) => {
              if (cat.value && c.category !== cat.value) return false;
              if (company.value && c.company !== company.value) return false;
              if (city.value && c.city !== city.value) return false;
              if (canton.value && c.canton !== canton.value) return false;
              if (onlyOpen.value) {
                const free = (c.participation_max ?? 0) - (c.registered ?? 0);
                if (free <= 0) return false;
              }
              if (onlyUpcoming.value && c.last_date && c.last_date < todayISO) return false;
              if (onlyWeekend.value && !isWeekendOnly(c.first_date, c.last_date)) return false;
              if (origin && radius > 0 && (dist == null || dist > radius)) return false;
              return true;
            });

            // sort
            if (origin && sortBy.value === "distance") {
              arr.sort((a, b) => {
                if (a.dist == null) return 1;
                if (b.dist == null) return -1;
                return (a.dist - b.dist) * (sortDir.value === "asc" ? 1 : -1);
              });
            } else {
              const dir = sortDir.value === "asc" ? 1 : -1;
              arr.sort((a, b) => {
                const av = a.c[sortBy.value] ?? "";
                const bv = b.c[sortBy.value] ?? "";
                if (av < bv) return -1 * dir;
                if (av > bv) return 1 * dir;
                return 0;
              });
            }
            return arr;
          });

          const visible = computed(() => filtered.value.slice(0, limit.value));

          watch([cat, company, city, canton, near, radiusKm, onlyOpen, onlyUpcoming, onlyWeekend, sortBy, sortDir], () => {
            limit.value = 60;
            try {
              localStorage.setItem(FILTER_KEY, JSON.stringify({
                cat: cat.value, company: company.value, city: city.value,
                canton: canton.value, near: near.value, radiusKm: radiusKm.value,
                onlyOpen: onlyOpen.value, onlyUpcoming: onlyUpcoming.value, onlyWeekend: onlyWeekend.value,
                sortBy: sortBy.value, sortDir: sortDir.value,
              }));
            } catch {}
          });

          // when user picks a "near city", auto-switch sort to distance
          watch(near, (v) => {
            if (v && cityCoords.value.get(v)) sortBy.value = "distance";
            else if (sortBy.value === "distance") sortBy.value = "first_date";
          });

          function reset() {
            cat.value = ""; company.value = ""; city.value = "";
            canton.value = ""; near.value = ""; radiusKm.value = 0;
            onlyOpen.value = false; onlyUpcoming.value = true; onlyWeekend.value = false;
            sortBy.value = "first_date"; sortDir.value = "asc";
            try { localStorage.removeItem(FILTER_KEY); } catch {}
          }

          // ── location combobox state ───────────────────────────────────
          const locOpen = ref(false);
          const locActive = ref(0);
          const MAX_SUGGEST = 10;

          const locSuggestions = computed(() => {
            const t = near.value.trim().toLowerCase();
            const all = cities.value;
            if (!t) return all; // empty: show all, scrollable
            // prefix matches first, then contains
            const prefix = [], contains = [];
            for (const c of all) {
              const lc = c.toLowerCase();
              if (lc.startsWith(t)) prefix.push(c);
              else if (lc.includes(t)) contains.push(c);
              if (prefix.length >= MAX_SUGGEST) break;
            }
            return [...prefix, ...contains].slice(0, MAX_SUGGEST);
          });

          watch(near, () => { locActive.value = 0; });

          function pickLoc(name) {
            near.value = name;
            locOpen.value = false;
          }
          function locKeydown(e) {
            const list = locSuggestions.value;
            if (e.key === "ArrowDown") { e.preventDefault(); locOpen.value = true; locActive.value = Math.min(locActive.value + 1, list.length - 1); }
            else if (e.key === "ArrowUp") { e.preventDefault(); locActive.value = Math.max(locActive.value - 1, 0); }
            else if (e.key === "Enter") {
              if (locOpen.value && list[locActive.value]) { e.preventDefault(); pickLoc(list[locActive.value]); }
            } else if (e.key === "Escape") { locOpen.value = false; }
          }

          // "In meiner Nähe": geolocate, snap to nearest known city
          function locateMe() {
            if (!navigator.geolocation) {
              geoError.value = "Geolokalisierung nicht verfügbar.";
              return;
            }
            geoBusy.value = true;
            geoError.value = "";
            navigator.geolocation.getCurrentPosition(
              (pos) => {
                geoBusy.value = false;
                const here = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                let best = null, bestD = Infinity;
                for (const [name, co] of cityCoords.value) {
                  const d = haversineKm(here, co);
                  if (d != null && d < bestD) { bestD = d; best = name; }
                }
                if (!best) { geoError.value = "Keine Orte gefunden."; return; }
                near.value = best;
                if (!radiusKm.value) radiusKm.value = 30;
              },
              (err) => {
                geoBusy.value = false;
                geoError.value = err.code === 1 ? "Standortzugriff verweigert." : "Standort nicht ermittelbar.";
              },
              { enableHighAccuracy: false, timeout: 8000, maximumAge: 5 * 60 * 1000 }
            );
          }

          function fmtDate(s) {
            if (!s) return "—";
            const [y, m, d] = s.split("-");
            return `${d}.${m}.${y}`;
          }
          function fmtRange(a, b) {
            if (!a) return "—";
            if (!b || a === b) return fmtDate(a);
            return `${fmtDate(a)} – ${fmtDate(b)}`;
          }
          function freeSpots(c) {
            const max = c.participation_max ?? 0;
            const reg = c.registered ?? 0;
            return Math.max(0, max - reg);
          }
          function statusBadge(c) {
            const free = freeSpots(c);
            const max = c.participation_max ?? 0;
            if (max === 0) return { label: "—", cls: "bg-muted text-muted-foreground" };
            if (free === 0) return { label: "Voll", cls: "badge-rose" };
            if (free <= Math.max(2, Math.floor(max * 0.2))) return { label: `${free} frei`, cls: "badge-amber" };
            return { label: `${free} frei`, cls: "badge-emerald" };
          }

          function relTime(iso) {
            if (!iso) return "";
            try {
              const t = new Date(iso);
              const diff = (Date.now() - t.getTime()) / 1000;
              if (diff < 60) return "gerade eben";
              if (diff < 3600) return `vor ${Math.floor(diff / 60)} Min`;
              if (diff < 86400) return `vor ${Math.floor(diff / 3600)} Std`;
              return `vor ${Math.floor(diff / 86400)} T`;
            } catch { return iso; }
          }

          function fmtDist(km) {
            if (km == null) return "";
            if (km < 1) return `${Math.round(km * 1000)} m`;
            if (km < 10) return `${km.toFixed(1)} km`;
            return `${Math.round(km)} km`;
          }

          return {
            courses, meta, loading, error,
            cat, company, city, canton, near, radiusKm,
            onlyOpen, onlyUpcoming, onlyWeekend, sortBy, sortDir, limit,
            advancedOpen, geoBusy, geoError, locateMe,
            locOpen, locActive, locSuggestions, pickLoc, locKeydown,
            categories, companies, cities, cantons, cityCoords, nearCoord,
            filtered, visible, cantonLabel, fmtDist,
            reset, fmtRange, freeSpots, statusBadge, relTime,
            theme,
          };
        },
        template: `
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
          <!-- Header -->
          <header class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8">
            <div>
              <div class="flex items-center gap-3">
                <div class="h-10 w-10 shrink-0 rounded-xl bg-primary/15 ring-1 ring-primary/30 flex items-center justify-center">
                  <svg class="w-6 h-6 text-primary" viewBox="0 5 24 14" fill="currentColor"><path d="M2 17c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2v3c-2 0-2 2-4 2s-2-2-4-2-2 2-4 2-2-2-4-2-2 2-4 2zM2 11c2 0 2-2 4-2s2 2 4 2 2-2 4-2 2 2 4 2 2-2 4-2v3c-2 0-2 2-4 2s-2-2-4-2-2 2-4 2-2-2-4-2-2 2-4 2z"/></svg>
                </div>
                <div>
                  <h1 class="text-2xl font-semibold tracking-tight">SLRG Kurssuche</h1>
                  <p class="text-sm text-muted-foreground">
                    Alle Kurse der Schweizerischen Lebensrettungs-Gesellschaft – durchsuchbar.
                  </p>
                </div>
              </div>
            </div>
            <div class="flex items-center gap-3 text-xs text-muted-foreground">
              <span class="inline-flex items-center gap-1.5">
                <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
                {{ meta.count }} Kurse · aktualisiert {{ relTime(meta.scraped_at) }}
              </span>
              <!-- Theme switcher: subtle 3-segment toggle -->
              <div class="inline-flex items-center rounded-lg border border-border bg-muted/50 p-0.5" role="group" aria-label="Farbschema">
                <button @click="theme = 'system'" :title="'System'"
                  :class="['h-7 w-7 rounded-md flex items-center justify-center transition', theme === 'system' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground']">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 21h8M12 18v3"/></svg>
                </button>
                <button @click="theme = 'light'" :title="'Hell'"
                  :class="['h-7 w-7 rounded-md flex items-center justify-center transition', theme === 'light' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground']">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                </button>
                <button @click="theme = 'dark'" :title="'Dunkel'"
                  :class="['h-7 w-7 rounded-md flex items-center justify-center transition', theme === 'dark' ? 'bg-card text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground']">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
              </div>
            </div>
          </header>

          <!-- Loading / error -->
          <div v-if="loading" class="card p-12 text-center text-muted-foreground">
            <div class="inline-block h-6 w-6 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
            <div class="mt-3">Lade Kurse…</div>
          </div>
          <div v-else-if="error" class="card p-8 text-rose-300 ring-1 ring-rose-500/30">
            <strong>Fehler:</strong> {{ error }}<br>
            <span class="text-sm text-muted-foreground">Stelle sicher, dass <code>courses.json</code> neben dieser Datei liegt und du via HTTP-Server (z.B. <code>python3 -m http.server</code>) servierst.</span>
          </div>

          <template v-else>
          <!-- Filter bar -->
          <section class="glass card p-4 sm:p-5 mb-6 sticky top-3 z-20">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-start">
              <!-- Location with locate-me button + radius slider underneath -->
              <div class="md:col-span-7">
                <div class="flex gap-2">
                  <div class="relative flex-1" v-click-outside="() => locOpen = false">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-primary z-10 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    <input v-model="near" type="text" autocomplete="off"
                      role="combobox" aria-autocomplete="list" :aria-expanded="locOpen" aria-controls="loc-listbox"
                      @focus="locOpen = true" @input="locOpen = true"
                      @keydown="locKeydown"
                      placeholder="In der Nähe von… (z.B. Kreuzlingen)"
                      class="input w-full pl-9" aria-label="Standort" />
                    <!-- Combobox listbox -->
                    <div v-if="locOpen && locSuggestions.length"
                      id="loc-listbox" role="listbox"
                      class="absolute left-0 right-0 top-full mt-1 z-30 max-h-[20rem] overflow-auto rounded-lg border border-border bg-card shadow-lg py-1">
                      <button v-for="(c, i) in locSuggestions" :key="c" type="button"
                        role="option" :aria-selected="i === locActive"
                        @mousedown.prevent="pickLoc(c)"
                        @mouseenter="locActive = i"
                        :class="['w-full text-left px-3 py-1.5 text-sm transition', i === locActive ? 'bg-muted text-foreground' : 'text-foreground/90 hover:bg-muted']">
                        {{ c }}
                      </button>
                    </div>
                  </div>
                  <button type="button" @click="locateMe" :disabled="geoBusy"
                    :title="geoBusy ? 'Suche Standort…' : 'Meinen Standort verwenden'"
                    aria-label="Meinen Standort verwenden"
                    class="btn btn-ghost px-3 shrink-0 disabled:opacity-50">
                    <svg v-if="!geoBusy" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="3"/>
                      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
                    </svg>
                    <svg v-else class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg>
                  </button>
                </div>
                <!-- Radius slider, only when a city is resolved; sits under the input -->
                <div v-if="nearCoord" class="mt-2 flex items-center gap-3 px-1">
                  <span class="text-xs text-muted-foreground whitespace-nowrap">Umkreis:</span>
                  <input type="range" min="0" max="400" step="10" v-model.number="radiusKm" class="flex-1 accent-primary" aria-label="Umkreis" />
                  <span class="text-xs font-mono w-16 text-right">{{ radiusKm > 0 ? radiusKm + ' km' : '∞' }}</span>
                </div>
                <div v-if="near && !nearCoord" class="mt-2 text-xs text-amber-300">
                  „{{ near }}" nicht gefunden — bitte aus der Vorschlagsliste wählen.
                </div>
                <div v-if="geoError" class="mt-2 text-xs text-rose-400">{{ geoError }}</div>
              </div>
              <!-- Category -->
              <select v-model="cat" class="input md:col-span-5" aria-label="Kategorie">
                <option value="">Alle Kategorien</option>
                <option v-for="c in categories" :key="c" :value="c">{{ c }}</option>
              </select>
            </div>

            <!-- Toggles + sort -->
            <div class="flex flex-wrap items-center gap-2 mt-3">
              <button class="btn btn-ghost" :class="onlyUpcoming ? 'ring-1 ring-primary text-primary' : ''" @click="onlyUpcoming = !onlyUpcoming">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                Nur kommende
              </button>
              <button class="btn btn-ghost" :class="onlyOpen ? 'ring-1 ring-primary text-primary' : ''" @click="onlyOpen = !onlyOpen">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"/></svg>
                Nur freie Plätze
              </button>
              <button class="btn btn-ghost" :class="onlyWeekend ? 'ring-1 ring-primary text-primary' : ''" @click="onlyWeekend = !onlyWeekend" title="Kurse, die nur an Samstag/Sonntag stattfinden">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 15h2M14 15h2"/></svg>
                Nur Wochenende
              </button>
              <div class="ml-auto flex items-center gap-2 text-sm">
                <span class="text-muted-foreground">Sortieren:</span>
                <select v-model="sortBy" class="input py-1.5 px-2 text-xs" aria-label="Sortierung">
                  <option value="first_date">Startdatum</option>
                  <option value="last_date">Enddatum</option>
                  <option value="category">Kategorie</option>
                  <option value="city">Ort</option>
                  <option value="canton">Kanton</option>
                  <option value="company">Anbieter</option>
                  <option value="distance" :disabled="!nearCoord">Distanz</option>
                </select>
                <button class="btn btn-ghost py-1.5 px-2" @click="sortDir = sortDir==='asc' ? 'desc' : 'asc'" :aria-label="'Richtung'">
                  {{ sortDir === 'asc' ? '↑' : '↓' }}
                </button>
                <button class="btn btn-ghost py-1.5 px-2 text-xs" @click="reset">Zurücksetzen</button>
              </div>
            </div>

            <!-- Advanced filters: native disclosure pattern -->
            <details class="mt-3 group" :open="advancedOpen" @toggle="advancedOpen = $event.target.open">
              <summary class="cursor-pointer list-none inline-flex items-center gap-1.5 text-xs text-muted-foreground hover:text-foreground transition select-none">
                <svg class="w-3.5 h-3.5 transition-transform group-open:rotate-90" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                Erweiterte Filter
                <span v-if="canton || city || company"
                  class="inline-flex items-center justify-center min-w-[1.1rem] h-4 px-1 rounded-full bg-primary/15 text-primary text-[10px] font-bold">
                  {{ [canton, city, company].filter(Boolean).length }}
                </span>
              </summary>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
                <div>
                  <label class="text-xs text-muted-foreground mb-1 block">Kanton</label>
                  <select v-model="canton" class="input w-full">
                    <option value="">Alle Kantone</option>
                    <option v-for="c in cantons" :key="c" :value="c">{{ cantonLabel(c) }}</option>
                  </select>
                </div>
                <div>
                  <label class="text-xs text-muted-foreground mb-1 block">Ort (exakt)</label>
                  <select v-model="city" class="input w-full">
                    <option value="">Alle Orte</option>
                    <option v-for="c in cities" :key="c" :value="c">{{ c }}</option>
                  </select>
                </div>
                <div>
                  <label class="text-xs text-muted-foreground mb-1 block">Anbieter</label>
                  <select v-model="company" class="input w-full">
                    <option value="">Alle Anbieter</option>
                    <option v-for="c in companies" :key="c" :value="c">{{ c }}</option>
                  </select>
                </div>
              </div>
            </details>

            <div class="text-xs text-muted-foreground mt-3">
              <span class="font-medium text-foreground">{{ filtered.length }}</span> Treffer
              <span v-if="filtered.length > visible.length"> · zeige {{ visible.length }}</span>
            </div>
          </section>

          <!-- Grid -->
          <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <a v-for="item in visible" :key="item.c.key" :href="item.c.url" target="_blank" rel="noopener"
              class="card p-5 animate-fade-in transition group">
              <div class="flex items-start justify-between gap-3">
                <div class="text-xs text-primary font-medium tracking-wide uppercase">{{ item.c.category || '—' }}</div>
                <span class="badge" :class="statusBadge(item.c).cls">{{ statusBadge(item.c).label }}</span>
              </div>
              <h3 class="mt-2 text-lg font-semibold leading-snug group-hover:text-primary transition">
                {{ item.c.city || item.c.company || 'Kurs ' + item.c.key }}
              </h3>
              <div class="mt-1 flex items-center gap-2 text-sm text-muted-foreground">
                <span class="truncate">{{ item.c.company }}</span>
                <span v-if="item.c.canton" class="badge bg-muted text-muted-foreground ring-1 ring-border shrink-0">{{ item.c.canton }}</span>
              </div>

              <div class="mt-4 flex items-center gap-2 text-sm">
                <svg class="w-4 h-4 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                <span>{{ fmtRange(item.c.first_date, item.c.last_date) }}</span>
              </div>

              <div class="mt-3 flex items-center justify-between text-xs text-muted-foreground">
                <span class="inline-flex items-center gap-1">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                  {{ item.c.registered ?? 0 }} / {{ item.c.participation_max ?? '?' }}
                </span>
                <span class="flex items-center gap-2">
                  <span v-if="item.dist != null" class="text-primary font-medium">{{ fmtDist(item.dist) }}</span>
                  <span class="font-mono opacity-60">#{{ item.c.key }}</span>
                </span>
              </div>
            </a>
          </section>

          <!-- Load more -->
          <div v-if="filtered.length > visible.length" class="flex justify-center mt-8">
            <button class="btn btn-primary" @click="limit += 60">Weitere {{ Math.min(60, filtered.length - visible.length) }} laden</button>
          </div>

          <div v-if="filtered.length === 0" class="card p-12 text-center text-muted-foreground">
            <div>Keine Kurse gefunden. Filter anpassen oder zurücksetzen.</div>
            <div v-if="nearCoord && radiusKm > 0" class="mt-4">
              <button class="btn btn-ghost" @click="radiusKm = 0">Umkreis aufheben</button>
            </div>
          </div>

          <footer class="mt-12 text-center text-xs text-muted-foreground">
            Daten von <a href="https://ausbildung.slrg.ch/Kurskalender" class="text-primary hover:underline">ausbildung.slrg.ch</a>.
            Diese App ist nicht offiziell.
          </footer>
          </template>
        </div>
        `,
      };

      createApp(App).mount("#app");
    </script>
  </body>
</html>
